services:
  accounts:
    image: "captainashish/accounts:s4"
    container_name: accounts-microservice
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - microdemo

  loans:
    image: "captainashish/loans:s4"
    container_name: loans-microservice
    ports:
      - "8090:8090"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - microdemo


  cards:
    image: "captainashish/cards:s4"
    container_name: cards-microservice
    ports:
      - "9000:9000"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - microdemo



networks:
  microdemo:
    driver: "bridge"